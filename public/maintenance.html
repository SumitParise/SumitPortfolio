<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maintenance | Sumit Parise</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #050505;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      color: #fff;
    }

    /* Ambient background glow */
    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(147, 51, 234, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 48px;
      text-align: center;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      max-width: 90%;
      width: 400px;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 16px 0;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 0%, #a8a8a8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: #888;
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 32px 0;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(147, 51, 234, 0.1);
      border: 1px solid rgba(147, 51, 234, 0.2);
      border-radius: 99px;
      font-size: 13px;
      color: #d8b4fe;
      font-family: monospace;
    }

    .dot {
      width: 8px;
      height: 8px;
      background-color: #a855f7;
      border-radius: 50%;
      box-shadow: 0 0 12px #a855f7;
      animation: pulse 2s infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <div class="icon">✨</div>
    <h1>Upgrading Experience</h1>
    <p>I'm currently pushing some updates to the portfolio. The site will be back online shortly.</p>
    <div class="status-badge">
      <div class="dot"></div>
      SYSTEM MAINTENANCE
    </div>
  </div>
</body>
</html>
